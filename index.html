<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Party - Withdraw HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(26, 34, 53, 0.85);
            --neon-blue: #00f2ff;
            --wa-green: #25D366;
            --orange-btn: linear-gradient(180deg, #ffbb33 0%, #ff8800 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #87e2f3 radial-gradient(circle at top, #00d2ff 0%, #87e2f3 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* --- CONTAINER UTAMA HD --- */
        .main-wrapper {
            width: 92%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HEADER BAGIAN ATAS --- */
        .withdraw-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 35px 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .withdraw-header h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--neon-blue);
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .main-title {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* Price Box HD */
        .price-box {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed #ff9800;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            color: #ffbb33;
            font-size: 1.4rem;
            font-weight: 800;
            box-shadow: inset 0 0 15px rgba(255, 152, 0, 0.1);
        }

        .feature-list {
            text-align: left;
            margin: 0 auto 30px;
            display: inline-block;
        }

        .feature-item {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .feature-item i {
            color: var(--neon-blue);
            margin-right: 12px;
            font-size: 1.1rem;
        }

        /* Hubungi Admin Button */
        .btn-wa {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--orange-btn);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(255, 136, 0, 0.3);
            transition: 0.3s;
        }

        .btn-wa:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 136, 0, 0.5);
        }

        /* --- TESTIMONI BAGIAN BAWAH (MENYATU) --- */
        .testi-container {
            padding: 30px 25px;
        }

        .testi-title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .testi-title i {
            color: #a33eb3;
            font-size: 1.4rem;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .review-user {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .player-name {
            color: var(--neon-blue);
            font-weight: 700;
            font-size: 1rem;
        }

        .stars { color: #ffcc33; font-size: 0.8rem; }

        .review-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .time-info {
            border-top: 2px solid var(--wa-green);
            padding-top: 8px;
            color: var(--wa-green);
            font-size: 0.75rem;
            font-weight: 800;
        }

        @media (max-width: 480px) {
            .withdraw-header h1 { font-size: 1.1rem; }
            .price-box { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="withdraw-header">
            <h1>Withdraw Neo Party</h1>
            
            <div class="main-title">
                PENCAIRAN KOIN SAAT INI MELALUI<br>WHATSAPP ADMIN
            </div>

            <div class="price-box">
                Withdraw : Rp 62.000 / B
            </div>

            <div class="feature-list">
                <div class="feature-item"><i class="fas fa-check-circle"></i> Admin Online 24 Jam</div>
                <div class="feature-item"><i class="fas fa-check-circle"></i> 100% Terjamin Amanah</div>
                <div class="feature-item"><i class="fas fa-check-circle"></i> Proses 1 Menit Langsung Transfer</div>
            </div>

            <a href="https://wa.me/6289509170352?text=Halo%20Admin,%20saya%20ingin%20bongkar%20koin." class="btn-wa">
                <i class="fab fa-whatsapp" style="font-size: 1.6rem;"></i> HUBUNGI ADMIN
            </a>
        </div>

        <div class="testi-container">
            <div class="testi-title">
                <i class="fas fa-comments"></i> Ulasan Pembeli
            </div>

            <div id="review-list">
                </div>
        </div>
    </div>

    <script>
        const players = ["Pakistan", "Hoki_Selalu", "PejuangB", "NandaHoreg", "Player_1895", "SultanDomino"];
        const texts = [
            "Adminnya ramah kalau ada kendala langsung dibantu.",
            "Udah order berkali-kali selalu amanah. Jozzz.",
            "Top markotop koinnya bosku.",
            "Bongkar di sini emang paling kilat, rekomen!",
            "Terjamin amanah, dana langsung cair hitungan menit.",
            "Makin gacor bongkar di sini, makasih admin."
        ];

        const list = document.getElementById('review-list');

        for (let i = 0; i < 5; i++) {
            const time = Math.floor(Math.random() * 55) + 2;
            const card = document.createElement('div');
            card.className = 'review-card';
            card.innerHTML = `
                <div class="review-user">
                    <span class="player-name">${players[i]}</span>
                    <span class="stars">★★★★★</span>
                </div>
                <p class="review-text">"${texts[i]}"</p>
                <div class="time-info">${time} Menit yang lalu</div>
            `;
            list.appendChild(card);
        }
    </script>
</body>
</html>
