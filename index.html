<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Neo Party - Live Update HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(26, 34, 53, 0.9);
            --neon-blue: #00f2ff;
            --wa-green: #25D366;
            --orange-btn: linear-gradient(180deg, #ffbb33 0%, #ff8800 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #87e2f3 radial-gradient(circle at top, #00d2ff 0%, #87e2f3 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .main-wrapper {
            width: 92%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* --- HEADER SECTION --- */
        .withdraw-header {
            padding: 35px 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .withdraw-header h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--neon-blue);
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .price-box {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed #ff9800;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            color: #ffbb33;
            font-size: 1.4rem;
            font-weight: 800;
        }

        .btn-wa {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--orange-btn);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(255, 136, 0, 0.3);
        }

        /* --- TESTIMONI SECTION (AUTO REFRESH) --- */
        .testi-container {
            padding: 30px 25px;
        }

        .testi-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .live-indicator {
            font-size: 0.7rem;
            color: var(--wa-green);
            background: rgba(37, 211, 102, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }

        #review-list {
            position: relative;
            min-height: 350px; /* Menjaga tinggi agar tidak goyang saat refresh */
        }

        .review-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .player-name { color: var(--neon-blue); font-weight: 700; }
        .stars { color: #ffcc33; font-size: 0.8rem; float: right; }
        .review-text { color: rgba(255, 255, 255, 0.8); font-size: 0.85rem; margin: 10px 0; line-height: 1.4; }
        .time-info { border-top: 2px solid var(--wa-green); padding-top: 8px; color: var(--wa-green); font-size: 0.75rem; font-weight: 800; }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="withdraw-header">
            <h1>Withdraw Neo Party</h1>
            <div style="color:white; margin-bottom:20px; font-size:0.9rem;">PENCAIRAN KOIN MELALUI WHATSAPP ADMIN</div>
            <div class="price-box">Withdraw : Rp 62.000 / B</div>
            <a href="https://wa.me/6289509170352" class="btn-wa">
                <i class="fab fa-whatsapp"></i> HUBUNGI ADMIN
            </a>
        </div>

        <div class="testi-container">
            <div class="testi-title">
                <span><i class="fas fa-comments" style="color:#a33eb3"></i> Ulasan Terbaru</span>
                <span class="live-indicator">● LIVE UPDATE</span>
            </div>

            <div id="review-list">
                </div>
        </div>
    </div>

    <script>
        // Data ulasan yang lebih banyak
        const allReviews = [
            { name: "Pakistan", text: "Adminnya ramah kalau ada kendala langsung dibantu.", stars: 5 },
            { name: "Hoki_Selalu", text: "Udah order berkali-kali selalu amanah. Jozzz.", stars: 5 },
            { name: "PejuangB", text: "Top markotop koinnya bosku.", stars: 4 },
            { name: "NandaHoreg", text: "Bongkar di sini emang paling kilat, rekomen!", stars: 5 },
            { name: "Player_1895", text: "Terjamin amanah, dana langsung cair hitungan menit.", stars: 5 },
            { name: "SultanDomino", text: "Makin gacor bongkar di sini, makasih admin.", stars: 5 },
            { name: "Jackpot_Boy", text: "Awalnya ragu, pas coba ternyata beneran amanah.", stars: 5 },
            { name: "WongPusat", text: "Nggak perlu nunggu lama, sedetik langsung landing.", stars: 4 },
            { name: "Leon_Gacor", text: "Situs bongkar paling fair, harga stabil.", stars: 5 },
            { name: "Mbak_Dewi", text: "Pelayanan adminnya sabar banget buat pemula.", stars: 5 }
        ];

        const listElement = document.getElementById('review-list');

        // Fungsi untuk membuat satu kartu ulasan
        function createReviewCard(data) {
            const time = Math.floor(Math.random() * 10) + 1; // 1-10 menit lalu
            const card = document.createElement('div');
            card.className = 'review-card';
            card.innerHTML = `
                <div class="review-user">
                    <span class="player-name">${data.name}</span>
                    <span class="stars">${'★'.repeat(data.stars)}</span>
                </div>
                <p class="review-text">"${data.text}"</p>
                <div class="time-info">${time} Menit yang lalu</div>
            `;
            return card;
        }

        // Fungsi untuk refresh ulasan
        function refreshReviews() {
            // Kosongkan list
            listElement.innerHTML = '';
            
            // Ambil 5 ulasan secara acak
            const shuffled = [...allReviews].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 5); 

            selected.forEach((rev, index) => {
                // Beri sedikit delay antar ulasan saat muncul
                setTimeout(() => {
                    const card = createReviewCard(rev);
                    listElement.appendChild(card);
                }, index * 100); 
            });
        }

        // Jalankan pertama kali
        refreshReviews();

        // Set interval untuk refresh setiap 2000ms (2 detik)
        setInterval(refreshReviews, 2000);
    </script>
</body>
</html>
